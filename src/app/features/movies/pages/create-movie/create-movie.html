<div class="w-full h-full text-gray-100 font-sans p-8 md:p-12 overflow-y-auto">
  <div class="max-w-6xl mx-auto flex flex-col lg:flex-row gap-12 p-8 md:p-12">
    <div class="w-full lg:w-1/3 min-w-[300px] flex flex-col items-center">
      <input
        type="file"
        accept="image/*"
        #fileInput
        (change)="onFileSelected($event)"
        class="hidden"
        aria-hidden="true"
        tabindex="-1"
      />

      <button
        type="button"
        (click)="fileInput.click()"
        aria-label="Selecionar imagem de capa do filme"
        class="w-full aspect-[2/3] max-h-[450px] bg-[#323238] rounded-xl border-2 border-dashed border-purple-500/50 flex flex-col items-center justify-center cursor-pointer transition-all hover:border-purple-600 hover:bg-[#3e3e44] overflow-hidden p-4 focus:outline-none focus:ring-2 focus:ring-purple-600 focus:border-transparent"
      >
        @if (imagePreview()) {
        <img
          [src]="imagePreview()"
          alt="Pré-visualização da capa selecionada"
          class="w-full h-full object-cover rounded-lg"
        />
        } @else {
        <svg
          aria-hidden="true"
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="currentColor"
          class="w-10 h-10 text-purple-500 mb-2"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5m-13.5-9L12 3m0 0 4.5 4.5M12 3v13.5"
          />
        </svg>
        <span class="text-gray-400 text-sm font-medium">Fazer upload</span>
        <span class="text-xs text-gray-500 mt-1">Clique para selecionar a imagem</span>
        }
      </button>
    </div>

    <div class="w-full lg:w-2/3 space-y-6" role="form" aria-label="Formulário de novo filme">
      <h2 class="text-3xl font-bold mb-6">Novo filme</h2>

      <div class="space-y-2">
        <div
          class="flex items-center bg-[#202024] rounded-lg px-4 py-3 w-full focus-within:ring-2 focus-within:ring-purple-600 transition group"
        >
          <img
            src="images/my-movies.svg"
            alt=""
            aria-hidden="true"
            class="w-5 h-5 mr-3 opacity-50 group-focus-within:opacity-100 transition duration-200"
          />
          <input
            type="text"
            id="titulo"
            aria-label="Título do filme"
            placeholder="Título do filme"
            class="bg-transparent outline-none text-white w-full placeholder-gray-500 text-sm"
          />
        </div>
      </div>

      <div class="flex gap-4">
        <div class="w-1/3 space-y-2">
          <div
            class="flex items-center bg-[#202024] rounded-lg px-4 py-3 w-full focus-within:ring-2 focus-within:ring-purple-600 transition group"
          >
            <img
              src="images/calendar.svg"
              alt=""
              aria-hidden="true"
              class="w-5 h-5 mr-3 opacity-50 group-focus-within:opacity-100 transition duration-200"
            />
            <input
              type="number"
              id="ano"
              aria-label="Ano de lançamento"
              placeholder="Ano"
              class="bg-transparent outline-none text-white w-full placeholder-gray-500 text-sm"
            />
          </div>
        </div>

        <div class="w-2/3 space-y-2">
          <div
            class="flex items-center bg-[#202024] rounded-lg px-4 py-3 w-full focus-within:ring-2 focus-within:ring-purple-600 transition group"
          >
            <img
              src="images/category.svg"
              alt=""
              aria-hidden="true"
              class="w-5 h-5 mr-3 opacity-50 group-focus-within:opacity-100 transition duration-200"
            />
            <input
              type="text"
              id="categoria"
              aria-label="Categoria do filme"
              placeholder="Categoria"
              class="bg-transparent outline-none text-white w-full placeholder-gray-500 text-sm"
            />
          </div>
        </div>
      </div>

      <div class="space-y-2">
        <div
          class="flex items-start bg-[#202024] rounded-lg px-4 py-3 w-full focus-within:ring-2 focus-within:ring-purple-600 transition group"
        >
          <textarea
            id="descricao"
            aria-label="Descrição do filme"
            placeholder="Descrição"
            rows="5"
            class="bg-transparent outline-none text-white w-full placeholder-gray-500 text-sm resize-y pt-0"
          ></textarea>
        </div>
      </div>

      <div class="flex justify-end gap-3 pt-4">
        <button
          type="button"
          (click)="cancelar()"
          class="px-6 py-3 border border-[#44444c] text-gray-400 rounded-lg hover:text-white hover:bg-[#323238] transition cursor-pointer focus:outline-none focus:ring-2 focus:ring-gray-500"
        >
          Cancelar
        </button>
        <button
          type="submit"
          (click)="salvar()"
          class="px-6 py-3 bg-purple-600 text-white font-bold rounded-lg hover:bg-purple-700 transition shadow-lg shadow-purple-900/50 cursor-pointer focus:outline-none focus:ring-2 focus:ring-purple-400 focus:ring-offset-2 focus:ring-offset-[#121214]"
        >
          Salvar
        </button>
      </div>
    </div>
  </div>
</div>
