<!-- Formulário de Login do Usuário -->
<div class="space-y-8">
  <div>
    <h1 class="text-2xl font-bold text-white">Acesse sua conta</h1>
  </div>

  <div class="space-y-4">
    <div
      class="flex items-center bg-[#202024] rounded-lg border border-transparent focus-within:border-purple-700 transition px-4 py-3"
    >
      <img src="images/email.svg" class="w-5 h-5 mr-3 opacity-50" />
      <input
        placeholder="E-mail"
        class="bg-transparent outline-none text-white w-full placeholder-gray-500"
      />
    </div>

    <div
      class="flex items-center bg-[#202024] rounded-lg border border-transparent focus-within:border-purple-700 transition px-4 py-3"
    >
      <img src="images/password.svg" class="w-5 h-5 mr-3 opacity-50" />
      <input
        placeholder="Senha"
        type="password"
        class="bg-transparent outline-none text-white w-full placeholder-gray-500"
      />
    </div>
  </div>

  <button
    class="w-full bg-purple-800 hover:bg-purple-700 text-white font-bold py-3 rounded-lg transition duration-200 cursor-pointer"
  >
    Entrar
  </button>
</div>
