<header
  class="w-full h-20 flex items-center justify-between px-4 md:px-8 border-b border-[#202024] bg-[#121214] z-50 relative box-border"
  role="banner"
>
  <a
    class="flex items-center gap-2 cursor-pointer rounded focus:outline-none focus:ring-2 focus:ring-purple-600"
    aria-label="Ir para página inicial"
  >
    <img src="images/logo.svg" alt="Logo da Aplicação" class="w-12 h-12" />
  </a>

  <nav class="hidden md:flex items-center gap-8 h-full" aria-label="Navegação Principal">
    <a
      class="h-full flex items-center gap-2 text-white font-bold border-b-2 border-purple-600 px-2 transition box-border focus:outline-none focus:text-purple-400"
      aria-current="page"
    >
      <svg
        aria-hidden="true"
        xmlns="http://www.w3.org/2000/svg"
        class="h-5 w-5"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"
        />
      </svg>
      <span>Explorar</span>
    </a>

    <a
      class="h-full flex items-center gap-2 text-gray-400 hover:text-white transition px-2 border-b-2 border-transparent hover:border-[#2c2c30] box-border focus:outline-none focus:text-white focus:border-white"
    >
      <svg
        aria-hidden="true"
        xmlns="http://www.w3.org/2000/svg"
        class="h-5 w-5"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M7 4v16M17 4v16M3 8h4m10 0h4M3 12h18M3 16h4m10 0h4M4 20h16a1 1 0 001-1V5a1 1 0 00-1-1H4a1 1 0 00-1 1v14a1 1 0 001 1z"
        />
      </svg>
      <span>Meus favoritos</span>
    </a>
  </nav>

  <div class="flex items-center gap-4">
    <div class="text-sm text-right hidden md:block leading-tight text-white">
      <p>Olá,</p>
      <strong>Heverys</strong>
    </div>

    <img
      src="https://github.com/rocketseat.png"
      alt="Foto de perfil de Heverys"
      class="w-10 h-10 rounded-full border-2 border-purple-600"
    />

    <button
      (click)="logout()"
      class="hidden md:flex items-center justify-center w-10 h-10 rounded-full bg-[#202024] text-gray-400 hover:text-red-400 hover:bg-red-400/10 transition group focus:outline-none focus:ring-2 focus:ring-red-500"
      title="Sair"
      aria-label="Sair da conta"
    >
      <svg
        aria-hidden="true"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor"
        class="w-5 h-5 group-hover:translate-x-1 transition"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M9 15v2a2 2 0 0 0 2 2h5a2 2 0 0 0 2-2v-2"
          opacity="0"
        />
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M10 9V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h3a2 2 0 0 0 2-2v-4"
        />
        <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4-4-4M21 12H9" />
      </svg>
    </button>

    <button
      class="md:hidden text-gray-100 p-2 hover:bg-[#202024] rounded-lg transition cursor-pointer focus:outline-none focus:ring-2 focus:ring-purple-600"
      (click)="toggleMenu()"
      aria-label="Abrir menu de navegação"
      [attr.aria-expanded]="isMenuOpen"
      aria-controls="mobile-menu"
    >
      <svg
        aria-hidden="true"
        xmlns="http://www.w3.org/2000/svg"
        class="h-6 w-6"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M4 6h16M4 12h16m-7 6h7"
        />
      </svg>
    </button>
  </div>

  @if(isMenuOpen) {
  <div
    id="mobile-menu"
    class="absolute top-20 left-0 w-full bg-black/10 backdrop-blur-md border-b border-white/10 flex flex-col p-4 md:hidden shadow-2xl z-50 transition-all"
  >
    <div class="flex items-center gap-3 mb-6 pb-4 border-b border-white/10">
      <div class="flex flex-col">
        <span class="text-xs uppercase tracking-wider text-gray-400 font-semibold"
          >Logado como</span
        >
        <strong class="text-white text-lg">Heverys</strong>
      </div>
    </div>

    <nav class="flex flex-col gap-2">
      <a
        class="flex items-center gap-3 px-4 py-3 bg-white/10 rounded-lg text-white font-bold border-l-4 border-purple-500 hover:bg-white/20 transition focus:outline-none focus:ring-2 focus:ring-purple-600"
        aria-current="page"
      >
        <svg
          aria-hidden="true"
          xmlns="http://www.w3.org/2000/svg"
          class="h-5 w-5 text-purple-400"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"
          />
        </svg>
        Explorar
      </a>

      <a
        class="flex items-center gap-3 px-4 py-3 text-gray-400 hover:text-white hover:bg-white/5 rounded-lg transition focus:outline-none focus:ring-2 focus:ring-purple-600"
      >
        <svg
          aria-hidden="true"
          xmlns="http://www.w3.org/2000/svg"
          class="h-5 w-5"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M7 4v16M17 4v16M3 8h4m10 0h4M3 12h18M3 16h4m10 0h4M4 20h16a1 1 0 001-1V5a1 1 0 00-1-1H4a1 1 0 00-1 1v14a1 1 0 001 1z"
          />
        </svg>
        Meus filmes
      </a>

      <button
        (click)="logout()"
        class="flex items-center gap-3 px-4 py-3 text-red-400 hover:text-red-300 hover:bg-red-500/10 rounded-lg transition mt-2 w-full text-left font-medium focus:outline-none focus:ring-2 focus:ring-red-500"
      >
        <svg
          aria-hidden="true"
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="currentColor"
          class="w-5 h-5 group-hover:translate-x-1 transition"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M9 15v2a2 2 0 0 0 2 2h5a2 2 0 0 0 2-2v-2"
            opacity="0"
          />
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M10 9V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h3a2 2 0 0 0 2-2v-4"
          />
          <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4-4-4M21 12H9" />
        </svg>
        Sair
      </button>
    </nav>
  </div>
  }
</header>
