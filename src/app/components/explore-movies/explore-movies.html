<div
  class="h-[calc(100vh-5rem)] w-full bg-[#121214] text-gray-100 font-sans flex flex-col overflow-hidden"
>
  <main class="flex-1 flex flex-col min-h-0 relative">
    <div
      class="p-4 md:p-8 flex flex-col md:flex-row md:items-start justify-between gap-4 shrink-0 z-10 bg-[#121214]"
      role="search"
      aria-label="Barra de ferramentas de filmes"
    >
      <div class="flex items-center gap-4">
        <h1 class="text-2xl md:text-3xl font-bold">Explorar</h1>

        <button
          type="button"
          (click)="adicionarFilme()"
          class="flex items-center gap-2 px-3 py-2 bg-purple-600 hover:bg-purple-700 text-white font-medium rounded-lg transition text-sm whitespace-nowrap cursor-pointer focus:outline-none focus:ring-2 focus:ring-purple-400 focus:ring-offset-2 focus:ring-offset-[#121214]"
        >
          <svg
            aria-hidden="true"
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="2"
            stroke="currentColor"
            class="w-5 h-5"
          >
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
          </svg>
          Adicionar Filme
        </button>
      </div>

      <div class="flex flex-col md:flex-row gap-3 w-full md:w-auto">
        <div
          class="flex items-center bg-[#202024] rounded-lg px-4 py-3 w-full md:w-72 focus-within:ring-2 focus-within:ring-purple-600 transition group"
        >
          <img
            src="images/search.svg"
            alt=""
            aria-hidden="true"
            class="w-5 h-5 mr-3 opacity-50 group-focus-within:opacity-100 transition duration-200"
          />
          <input
            type="text"
            aria-label="Pesquisar filme por nome"
            placeholder="Pesquisar filme"
            class="bg-transparent outline-none text-white w-full placeholder-gray-500 text-sm"
          />
        </div>

        <div
          class="flex items-center bg-[#202024] rounded-lg px-4 py-3 w-full md:w-52 focus-within:ring-2 focus-within:ring-purple-600 transition group"
        >
          <img
            src="images/category.svg"
            alt=""
            aria-hidden="true"
            class="w-5 h-5 mr-3 opacity-50 group-focus-within:opacity-100 transition duration-200"
          />
          <input
            type="text"
            aria-label="Filtrar por categoria"
            placeholder="Categoria"
            class="bg-transparent outline-none text-white w-full placeholder-gray-500 text-sm"
          />
        </div>

        <button
          type="button"
          class="flex items-center justify-center gap-2 px-4 py-3 rounded-lg border border-[#2c2c30] text-gray-400 hover:text-white hover:bg-[#202024] hover:border-red-500 transition w-full md:w-auto whitespace-nowrap group focus:outline-none focus:ring-2 focus:ring-red-500"
          aria-label="Limpar todos os filtros"
        >
          <svg
            aria-hidden="true"
            xmlns="http://www.w3.org/2000/svg"
            class="h-4 w-4 group-hover:text-red-400 transition"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M6 18L18 6M6 6l12 12"
            />
          </svg>
          <span class="text-sm font-medium">Limpar</span>
        </button>
      </div>
    </div>

    @if(movies().length === 0) {
    <div class="flex-1 flex flex-col items-center justify-center text-center p-8">
      <img
        src="images/my-movies.svg"
        alt=""
        aria-hidden="true"
        class="mb-6 w-14 h-14 mr-3 opacity-50 transition duration-200"
      />

      <p class="text-gray-400 text-lg font-medium mb-1 flex items-center justify-center gap-2">
        Nenhum filme encontrado <span class="text-2xl" aria-hidden="true">😔</span>
      </p>

      <p class="text-gray-500 text-sm mb-8">Que tal tentar outra busca?</p>

      <button
        type="button"
        class="flex items-center gap-2 text-gray-400 hover:text-white transition group cursor-pointer focus:outline-none focus:ring-2 focus:ring-purple-600 rounded px-2 py-1"
      >
        <svg
          aria-hidden="true"
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="2"
          stroke="currentColor"
          class="w-4 h-4 group-hover:text-red-400 transition"
        >
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
        <span class="text-sm font-medium">Limpar filtro</span>
      </button>
    </div>
    } @else {
    <app-movies-list />
    }
  </main>
</div>
